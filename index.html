<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0f1f" />
  <meta name="description" content="オフラインで遊べるミニゲーム集。第1弾はイライラしない楽しいスネークアリーナ。" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Pocket Arcade</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- ===================== Opening / Hub screen ===================== -->
  <section id="screen-home" class="screen is-active">
    <div class="bg-dots" aria-hidden="true"></div>

    <header class="home-top">
      <div class="lives" id="lives-box" title="ライフ">
        <div class="hearts" id="hearts"></div>
        <div class="life-timer" id="life-timer"></div>
      </div>
      <button class="icon-btn" id="btn-settings" aria-label="設定">⚙</button>
    </header>

    <div class="home-hero">
      <div class="logo-mark" aria-hidden="true">
        <span class="logo-snake"></span>
      </div>
      <h1 class="title">POCKET<span>ARCADE</span></h1>
      <p class="subtitle">オフラインで遊べる ミニゲーム集</p>
    </div>

    <div class="game-list" id="game-list">
      <button class="game-card" data-game="snake">
        <div class="game-card-art art-snake" aria-hidden="true"></div>
        <div class="game-card-body">
          <h2>スネークアリーナ</h2>
          <p>くねくね伸ばして世界一を目指す</p>
          <div class="game-card-meta">
            <span class="hi">BEST <b id="home-hi">0</b></span>
            <span class="play-pill">▶ あそぶ</span>
          </div>
        </div>
      </button>

      <div class="game-card is-locked" aria-disabled="true">
        <div class="game-card-art art-soon" aria-hidden="true">SOON</div>
        <div class="game-card-body">
          <h2>つぎのゲーム</h2>
          <p>準備中… おたのしみに</p>
        </div>
      </div>
    </div>

    <footer class="home-foot">PWA · インストールしてオフラインでも</footer>
  </section>

  <!-- ===================== Snake game screen ===================== -->
  <section id="screen-snake" class="screen">
    <canvas id="game-canvas"></canvas>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-top">
        <button class="icon-btn ghost" id="btn-back" aria-label="戻る">‹</button>
        <div class="score-wrap">
          <div class="score-label">SCORE</div>
          <div class="score-value" id="score">0</div>
        </div>
        <button class="icon-btn ghost" id="btn-pause" aria-label="一時停止">⏸</button>
      </div>

      <div class="hud-side" id="leaderboard"></div>

      <div class="combo-pop" id="combo-pop"></div>

      <canvas id="minimap" width="120" height="120"></canvas>

      <button class="boost-btn" id="boost-btn" aria-label="ブースト">
        <span>≫</span>
      </button>
    </div>

    <!-- Pause overlay -->
    <div class="overlay" id="pause-overlay" hidden>
      <div class="panel">
        <h2>一時停止</h2>
        <button class="btn primary" id="btn-resume">つづける</button>
        <button class="btn" id="btn-quit">やめる</button>
      </div>
    </div>

    <!-- Death / continue overlay -->
    <div class="overlay" id="death-overlay" hidden>
      <div class="panel">
        <h2 id="death-title">やられた！</h2>
        <div class="death-score">スコア <b id="death-score">0</b></div>
        <div class="death-best" id="death-best"></div>
        <div class="death-hearts" id="death-hearts"></div>
        <button class="btn primary" id="btn-revive">❤ もう一度（ライフ -1）</button>
        <button class="btn" id="btn-home">ホームへ</button>
        <p class="death-note" id="death-note"></p>
      </div>
    </div>

    <!-- Countdown -->
    <div class="countdown" id="countdown" hidden></div>
  </section>

  <!-- ===================== Settings overlay ===================== -->
  <div class="overlay" id="settings-overlay" hidden>
    <div class="panel">
      <h2>設定</h2>
      <label class="toggle">
        <span>効果音</span>
        <input type="checkbox" id="set-sound" checked />
        <i></i>
      </label>
      <label class="toggle">
        <span>BGM</span>
        <input type="checkbox" id="set-music" checked />
        <i></i>
      </label>
      <label class="toggle">
        <span>バイブ</span>
        <input type="checkbox" id="set-haptics" checked />
        <i></i>
      </label>
      <div class="set-row">
        <span>操作方法</span>
        <div class="seg" id="set-control">
          <button data-mode="follow" class="active">なぞる</button>
          <button data-mode="swipe">スワイプ</button>
        </div>
      </div>
      <button class="btn primary" id="btn-close-settings">とじる</button>
      <p class="death-note">データはこの端末にのみ保存されます。</p>
    </div>
  </div>

  <!-- Install hint toast -->
  <div class="toast" id="install-toast" hidden>
    <span>ホーム画面に追加してアプリとして遊べます</span>
    <button id="btn-install">追加</button>
    <button id="btn-install-x" aria-label="閉じる">×</button>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/snake.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
